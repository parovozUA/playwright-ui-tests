name: Playwright Tests + Allure Report

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [ chromium, firefox, webkit ]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Clean allure results
        run: rm -rf allure-results

      - name: Run tests
        run: pytest --browser ${{ matrix.browser }}

      - name: Upload allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results

  report:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: allure-results

      - name: Merge results
        run: |
          mkdir merged-results
          cp -r allure-results/*/* merged-results/ || true

      - name: Get Allure history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Install Allure
        run: |
          sudo apt-get update
          sudo apt-get install default-jre -y
          ALLURE_VERSION=2.39.0
          wget https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          tar -zxvf allure-${ALLURE_VERSION}.tgz
          sudo mv allure-${ALLURE_VERSION} /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Create Allure environment file
        run: |
          mkdir -p merged-results

          echo "Environment=CI" > merged-results/environment.properties
          echo "Branch=${{ github.ref_name }}" >> merged-results/environment.properties
          echo "Commit=${{ github.sha }}" >> merged-results/environment.properties

      - name: Generate report
        run: |
          mkdir -p merged-results/history
          cp -r gh-pages/history merged-results/ || true
          allure generate merged-results --clean -o allure-report

      - name: Save history
        run: |
          cp -r allure-report/history gh-pages/ || true

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report